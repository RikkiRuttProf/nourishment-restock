  <script>
  const DB_NAME='nourish-db';const STORE_NAME='kv';
  function openDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=()=>req.result.createObjectStore(STORE_NAME);req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error);});}
  const storage={
    async get(key){const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE_NAME,'readonly');const req=tx.objectStore(STORE_NAME).get(key);req.onsuccess=()=>{if(req.result!==undefined)resolve({key,value:req.result});else resolve(null);};req.onerror=()=>reject(req.error);});},
    async set(key,value){const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE_NAME,'readwrite');tx.objectStore(STORE_NAME).put(value,key);tx.oncomplete=()=>resolve({key,value});tx.onerror=()=>reject(tx.error);});},
    async delete(key){const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE_NAME,'readwrite');tx.objectStore(STORE_NAME).delete(key);tx.oncomplete=()=>resolve({key,deleted:true});tx.onerror=()=>reject(tx.error);});}
  };
  </script>

function getWeeksForMonth(y,m){const ld=new Date(y,m+1,0).getDate();const ws=[];let s=1;while(s<=ld){const d=new Date(y,m,s);const e=d.getDay()===0?Math.min(s+6,ld):Math.min(s+(6-d.getDay()),ld);const ad=[];for(let i=s;i<=e;i++){const dt=new Date(y,m,i);ad.push({date:i,dayOfWeek:dt.getDay(),label:DAYS[dt.getDay()]});}ws.push({num:ws.length+1,startDate:s,endDate:e,activeDays:ad});s=e+1;}return ws;}

  const weeks=useMemo(()=>getWeeksForMonth(year,month),[year,month]);

  const loc=LOCATIONS.find(l=>l.key===locKey);

    if(!usingTemplate){
      // Fallback: generate basic workbook
      wb=XLSX.utils.book_new();
      showToast("No template — generating basic export...");
    }

    if(usingTemplate){
      // ── Write data into template sheets ──

      // TEMPLATE tab: set month and dates in row 1
      const tmplWs=wb.Sheets["TEMPLATE"];
      if(tmplWs){
        // Month in merged E1:F1
        tmplWs["E1"]={t:"s",v:MONTHS[month]+" "+year};
        // Day-of-week dates in I1, K1, M1, O1, Q1, S1, U1
        for(let dow=0;dow<7;dow++){
          const col=DATE_COLS[dow];
          tmplWs[col+"1"]={t:"s",v:dayDates[dow]||""};
        }
      }

      // Each location tab: write Unit Pars (F), INV, and Stock
      for(const l of LOCATIONS){
        const ws=wb.Sheets[l.sheet];
        if(!ws)continue;
        const pars=allPars[l.key]||{};
        const data=allData[l.key]||{};

        for(const item of ITEMS){
          const r=item.id; // item.id matches the Excel row number (3-49)
          // Unit Pars → column F
          const parVal=pars[item.id];
          if(parVal!==undefined&&parVal!=="") ws["F"+r]={t:"n",v:parseInt(parVal)||0};

          // INV and Stock per day
          for(let dow=0;dow<7;dow++){
            const [invCol,stockCol]=DAY_COLS[dow];
            const inv=data[item.id]?.[dow]?.inv;
            const stock=data[item.id]?.[dow]?.stock;
            if(inv!==undefined&&inv!=="") ws[invCol+r]={t:"n",v:parseInt(inv)||0};
            if(stock!==undefined&&stock!=="") ws[stockCol+r]={t:"n",v:parseInt(stock)||0};
          }
        }
      }
    }else{
      // ── Fallback: build from scratch (simplified) ──
      for(const l of LOCATIONS){
        const data=allData[l.key]||{};const pars=allPars[l.key]||{};const hidden=getHidden(l.key);
        const rows=[["LOCATION: "+l.name,"","","","Month: "+MONTHS[month]+" "+year,"","",
          "SUN",dayDates[0]||"","MON",dayDates[1]||"","TUE",dayDates[2]||"","WED",dayDates[3]||"",
          "THU",dayDates[4]||"","FRI",dayDates[5]||"","SAT",dayDates[6]||"","Total"],
          ["ITEM","Vendor","SKU","Cost","Adj Cost","Unit Pars","Par Cost",
          "INV","Stock","INV","Stock","INV","Stock","INV","Stock","INV","Stock","INV","Stock","INV","Stock","Total Stock"]];
        for(const item of ITEMS){
          if(hidden.includes(item.id))continue;
          const row=[item.name,item.vendor,"","","",pars[item.id]||"",""];
          let tot=0;
          for(let dow=0;dow<7;dow++){
            const inv=data[item.id]?.[dow]?.inv??"";const stock=data[item.id]?.[dow]?.stock??"";
            row.push(inv,stock);if(typeof stock==="number")tot+=stock;
          }
          row.push(tot);rows.push(row);
        }
        const ws=XLSX.utils.aoa_to_sheet(rows);
        const tn=l.name.length>31?l.name.substring(0,31):l.name;
        XLSX.utils.book_append_sheet(wb,ws,tn);
      }
    }

    const mm=String(month+1).padStart(2,"0");
    const fileName=`${year}_${mm}-${MONTHS[month]}_Week_${cw.num}.xlsx`;
    XLSX.writeFile(wb,fileName);
    showToast("✓ Exported "+fileName);
  };

  // ── Monthly Template Import ──────────────────────────────
  const importMonthlyTemplate=async(file)=>{
    try{
      const buf=await file.arrayBuffer();
      const b64=btoa(String.fromCharCode(...new Uint8Array(buf)));
      await storage.set(MTMPL_KEY,b64);
      setHasMonthlyTmpl(true);
      showToast("✓ Monthly template imported");
    }catch(e){showToast("Import failed: "+e.message);}
  };

  // ── Monthly Summary Export ───────────────────────────────
  const WEEK_QTY_COLS=["B","D","F","H","J","L"]; // Week 1-6 qty columns
  const WEEK_COST_COLS=["C","E","G","I","K","M"]; // Week 1-6 cost columns

  const exportMonthlySummary=async()=>{
    showToast("Generating monthly summary...");
    const allWeeks=getWeeksForMonth(year,month);

    // Try reading item costs from stored weekly template
    let itemCosts={};
    try{
      const tmplData=await storage.get(TMPL_KEY);
      if(tmplData?.value){
        const raw=atob(tmplData.value);
        const arr=new Uint8Array(raw.length);
        for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
        const twb=XLSX.read(arr,{type:"array"});
        const tws=twb.Sheets["TEMPLATE"];
        if(tws){
          for(let r=3;r<=49;r++){
            const cell=tws["E"+r];
            if(cell&&typeof cell.v==="number")itemCosts[r]=cell.v;
          }
        }
      }
    }catch{}

    // Load all weeks' data for every location
    const weekData={}; // weekData[weekNum][locKey] = {itemId: {dow: {inv,stock}}}
    for(const w of allWeeks){
      weekData[w.num]={};
      for(const l of LOCATIONS){
        try{
          const r=await storage.get(dKey(year,month,w.num,l.key));
          weekData[w.num][l.key]=r?.value?JSON.parse(r.value):{};
        }catch{weekData[w.num][l.key]={};}
      }
    }

    // Compute aggregates
    // Per location per week: total qty and cost
    const locWeekQty={}; // locWeekQty[locKey][weekNum]
    const locWeekCost={};
    // Per item per week: total qty and cost
    const itemWeekQty={}; // itemWeekQty[itemId][weekNum]
    const itemWeekCost={};

    for(const l of LOCATIONS){
      locWeekQty[l.key]={};locWeekCost[l.key]={};
      for(const w of allWeeks){
        let lq=0,lc=0;
        const data=weekData[w.num][l.key]||{};
        for(const item of ITEMS){
          let iq=0;
          for(let dow=0;dow<7;dow++){
            const s=data[item.id]?.[dow]?.stock;
            if(typeof s==="number"){iq+=s;lq+=s;}
          }
          const cost=(itemCosts[item.id]||0)*iq;
          lc+=cost;
          if(!itemWeekQty[item.id])itemWeekQty[item.id]={};
          if(!itemWeekCost[item.id])itemWeekCost[item.id]={};
          itemWeekQty[item.id][w.num]=(itemWeekQty[item.id][w.num]||0)+iq;
          itemWeekCost[item.id][w.num]=(itemWeekCost[item.id][w.num]||0)+cost;
        }
        locWeekQty[l.key][w.num]=lq;
        locWeekCost[l.key][w.num]=lc;
      }
    }

    let wb;let usingTmpl=false;

    // Try loading monthly template
    try{
      const mtData=await storage.get(MTMPL_KEY);
      if(mtData?.value){
        const raw=atob(mtData.value);
        const arr=new Uint8Array(raw.length);
        for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
        wb=XLSX.read(arr,{type:"array"});
        usingTmpl=true;
      }
    }catch{}

    if(!usingTmpl) wb=XLSX.utils.book_new();

    if(usingTmpl){
      // Fill Location Cost Summary
      const lcs=wb.Sheets["Location Cost Summary"];
      if(lcs){
        lcs["B2"]={t:"s",v:MONTHS[month]};
        lcs["E2"]={t:"s",v:String(year)};
        // Date ranges in row 4
        for(let wi=0;wi<allWeeks.length&&wi<6;wi++){
          const w=allWeeks[wi];
          const col=WEEK_QTY_COLS[wi];
          lcs[col+"4"]={t:"s",v:`${month+1}/${w.startDate} - ${month+1}/${w.endDate}`};
        }
        // Location data rows 6-43
        for(let li=0;li<LOCATIONS.length;li++){
          const l=LOCATIONS[li];
          const r=6+li;
          for(let wi=0;wi<allWeeks.length&&wi<6;wi++){
            const w=allWeeks[wi];
            const qCol=WEEK_QTY_COLS[wi];
            const cCol=WEEK_COST_COLS[wi];
            lcs[qCol+r]={t:"n",v:locWeekQty[l.key][w.num]||0};
            lcs[cCol+r]={t:"n",v:Math.round((locWeekCost[l.key][w.num]||0)*100)/100};
          }
        }
      }

      // Fill Item Cost Summary
      const ics=wb.Sheets["Item Cost Summary"];
      if(ics){
        ics["B2"]={t:"s",v:MONTHS[month]};
        ics["E2"]={t:"s",v:String(year)};
        for(let wi=0;wi<allWeeks.length&&wi<6;wi++){
          const w=allWeeks[wi];
          const col=WEEK_QTY_COLS[wi];
          ics[col+"4"]={t:"s",v:`${month+1}/${w.startDate} - ${month+1}/${w.endDate}`};
        }
        // Item data rows 6-52 (47 items)
        for(let ii=0;ii<ITEMS.length;ii++){
          const item=ITEMS[ii];
          const r=6+ii;
          for(let wi=0;wi<allWeeks.length&&wi<6;wi++){
            const w=allWeeks[wi];
            const qCol=WEEK_QTY_COLS[wi];
            const cCol=WEEK_COST_COLS[wi];
            ics[qCol+r]={t:"n",v:itemWeekQty[item.id]?.[w.num]||0};
            ics[cCol+r]={t:"n",v:Math.round((itemWeekCost[item.id]?.[w.num]||0)*100)/100};
          }
        }
      }
    }else{
      // Fallback: generate basic summary
      const lRows=[["MONTHLY LOCATION COST SUMMARY — "+MONTHS[month]+" "+year],
        ["LOCATION",...allWeeks.flatMap(w=>["Wk"+w.num+" Qty","Wk"+w.num+" $"]),"TOTAL Qty","TOTAL $"]];
      for(const l of LOCATIONS){
        const row=[l.name];let tq=0,tc=0;
        for(const w of allWeeks){
          const q=locWeekQty[l.key][w.num]||0;const c=locWeekCost[l.key][w.num]||0;
          row.push(q,Math.round(c*100)/100);tq+=q;tc+=c;
        }
        row.push(tq,Math.round(tc*100)/100);lRows.push(row);
      }
      const lws=XLSX.utils.aoa_to_sheet(lRows);
      lws["!cols"]=[{wch:35},...Array(allWeeks.length*2+2).fill({wch:12})];
      XLSX.utils.book_append_sheet(wb,lws,"Location Cost Summary");

      const iRows=[["MONTHLY ITEM COST SUMMARY — "+MONTHS[month]+" "+year],
        ["ITEM",...allWeeks.flatMap(w=>["Wk"+w.num+" Qty","Wk"+w.num+" $"]),"TOTAL Qty","TOTAL $"]];
      for(const item of ITEMS){
        const row=[item.name];let tq=0,tc=0;
        for(const w of allWeeks){
          const q=itemWeekQty[item.id]?.[w.num]||0;const c=itemWeekCost[item.id]?.[w.num]||0;
          row.push(q,Math.round(c*100)/100);tq+=q;tc+=c;
        }
        row.push(tq,Math.round(tc*100)/100);iRows.push(row);
      }
      const iws=XLSX.utils.aoa_to_sheet(iRows);
      iws["!cols"]=[{wch:35},...Array(allWeeks.length*2+2).fill({wch:12})];
      XLSX.utils.book_append_sheet(wb,iws,"Item Cost Summary");
    }

    const mm=String(month+1).padStart(2,"0");
    const mFileName=`${year}_${mm}-${MONTHS[month]}_Monthly_Summary.xlsx`;
    XLSX.writeFile(wb,mFileName);
    showToast("✓ Exported "+mFileName);
  };

        <div style={S.header}><button style={S.backBtn} onClick={()=>setAdminLoc(null)}>← Back</button><div style={{flex:1}}><div style={S.headerTitle}>{locName}</div><div style={S.headerSub}>Toggle items on/off</div></div><Logo/></div>
        <div style={S.body}>
          <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>{ITEMS.length-hidden.length} of {ITEMS.length} items active</div>
          {ITEMS.map(item=>{const on=!hidden.includes(item.id);const showCat=item.cat!==currentCat;if(showCat)currentCat=item.cat;return(
            <div key={item.id}>
              {showCat&&<div style={{fontSize:12,fontWeight:700,color:CC[item.cat],textTransform:"uppercase",marginTop:16,marginBottom:8,letterSpacing:0.5}}>{item.cat}</div>}
              <div style={{display:"flex",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #f1f5f9",gap:12}}>
                <div style={S.catBadge(CC[item.cat]||"#94a3b8")}/>
                <div style={{flex:1,fontSize:14,color:on?"#1e293b":"#94a3b8",fontWeight:500,textDecoration:on?"none":"line-through"}}>{item.name}</div>
                <button style={S.toggle(on)} onClick={()=>toggleItem(item.id)}><div style={S.toggleDot(on)}/></button>
              </div>
            </div>);})}
        </div>
        {toast&&<div style={S.toast}>{toast}</div>}
      </div>);
  }

  // ── Admin: Par Level Editor ──
  if(screen==="admin"&&adminSub==="pars"&&adminLoc){
    const locName=LOCATIONS.find(l=>l.key===adminLoc)?.name;
    const hidden=getHidden(adminLoc);
    const vis=ITEMS.filter(it=>!hidden.includes(it.id));
    const setP=(id,val)=>{const v=val===""?"":Math.max(0,parseInt(val)||0);setLocalPars(p=>({...p,[id]:v}));};
    let currentCat="";
    return(
      <div style={S.app}>
        <div style={S.header}><button style={S.backBtn} onClick={()=>setAdminLoc(null)}>← Back</button><div style={{flex:1}}><div style={S.headerTitle}>{locName}</div><div style={S.headerSub}>Set par levels for active items</div></div><Logo/></div>
        <div style={{...S.body,paddingBottom:80}}>
          {vis.map(item=>{const showCat=item.cat!==currentCat;if(showCat)currentCat=item.cat;return(
            <div key={item.id}>
              {showCat&&<div style={{fontSize:12,fontWeight:700,color:CC[item.cat],textTransform:"uppercase",marginTop:16,marginBottom:8,letterSpacing:0.5}}>{item.cat}</div>}
              <div style={{display:"flex",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #f1f5f9",gap:12}}>
                <div style={S.catBadge(CC[item.cat]||"#94a3b8")}/>
                <div style={{flex:1,fontSize:14,fontWeight:500,color:"#1e293b"}}>{item.name}</div>
                <input type="number" inputMode="numeric" min="0" style={{...S.input(false),width:60,fontSize:16}} value={localPars[item.id]??""} placeholder="–" onFocus={e=>e.target.select()} onChange={e=>setP(item.id,e.target.value)}/>
              </div>
            </div>);})}
        </div>
        <div style={S.saveBar}>
          <div style={{flex:1}}/>
          <button style={S.saveBtn} onClick={()=>saveAdminPars(adminLoc,localPars)}>Save Par Levels</button>
        </div>
        {toast&&<div style={S.toast}>{toast}</div>}
      </div>);
  }

  // ── Period Selection ──
  if(screen==="period") return(
    <div style={S.app}>
      <div style={S.header}><div style={{flex:1}}><div style={S.headerTitle}>Unit Nourishment Restock</div><div style={S.headerSub}>Select period to begin</div></div><Logo/></div>
      <div style={S.body}>
        <div style={S.card}><div style={S.sectionLabel}>Year</div><div style={S.yearNav}><button style={S.yearBtn} onClick={()=>setYear(y=>y-1)}>‹</button><span style={S.yearLabel}>{year}</span><button style={S.yearBtn} onClick={()=>setYear(y=>y+1)}>›</button></div></div>
        <div style={S.card}><div style={S.sectionLabel}>Month</div><div style={S.monthGrid}>{MONTHS.map((m,i)=>(<button key={m} style={S.selectBtn(month===i)} onClick={()=>{setMonth(i);setWeekIdx(0);}}>{m.slice(0,3)}</button>))}</div></div>
        <div style={S.card}><div style={S.sectionLabel}>Week</div>{weeks.map((w,i)=>(<div key={i} style={S.weekCard(weekIdx===i)} onClick={()=>setWeekIdx(i)}><div style={{fontWeight:700,fontSize:15,color:"#1e3a5f"}}>Week {w.num}</div><div style={{fontSize:13,color:"#64748b",marginTop:2}}>{MONTHS[month].slice(0,3)} {w.startDate} – {w.endDate}{" "}<span style={{color:"#94a3b8"}}>({w.activeDays.map(d=>d.label).join(", ")})</span></div></div>))}</div>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button style={{...S.saveBtn,flex:1}} onClick={()=>setScreen("locations")}>Continue to Locations →</button>
          <button style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:10,padding:"14px 18px",fontSize:14,cursor:"pointer",color:"#64748b",fontWeight:600}} onClick={()=>{setPinInput("");setPinError(false);setAdminSub(null);setAdminLoc(null);setScreen("pin");}}>⚙ Admin</button>
        </div>
        <button style={{width:"100%",marginTop:8,background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:10,padding:"14px 16px",fontSize:14,cursor:"pointer",color:"#334155",fontWeight:600,textAlign:"center"}} onClick={exportMonthlySummary}>
          📊 Export {MONTHS[month]} {year} Monthly Summary
        </button>
        <div style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:4}}>
          {hasMonthlyTmpl?"Using monthly template":"No monthly template — basic format (import in Admin)"}
        </div>
      </div>
      {toast&&<div style={S.toast}>{toast}</div>}
    </div>
  );

  // ── Location Selection ──
  if(screen==="locations") return(
    <div style={S.app}>
      <div style={S.header}><button style={S.backBtn} onClick={()=>setScreen("period")}>← Back</button><div style={{flex:1}}><div style={S.headerTitle}>Select Location</div><div style={S.headerSub}>{MONTHS[month]} {year} — Week {cw.num} ({month+1}/{cw.startDate}–{cw.endDate})</div></div><Logo/></div>
      <div style={S.body}>
        <div style={S.sectionLabel}>{LOCATIONS.length} Locations · <span style={{color:"#22c55e"}}>●</span> = has data</div>
        {LOCATIONS.map(l=>{const hd=!!allWeekData[l.key]&&Object.keys(allWeekData[l.key]).length>0;const ic=ITEMS.filter(it=>!getHidden(l.key).includes(it.id)).length;return(
          <div key={l.key} style={S.locRow(hd)} onClick={()=>{setLocKey(l.key);setDayIdx(0);setScreen("entry");}}>
            <div style={S.locDot(hd)}/><div style={{flex:1}}><div style={{fontWeight:600,fontSize:15,color:"#1e293b"}}>{l.name}</div><div style={{fontSize:12,color:"#94a3b8"}}>{ic} items</div></div><div style={{fontSize:20,color:"#cbd5e1"}}>›</div>
          </div>);})}
        <div style={{marginTop:16,padding:"4px 0"}}>
          <button style={{...S.saveBtn,width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={exportWeeklyExcel}>
            📥 Export Week {cw.num} to Excel
          </button>
          <div style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:6}}>
            {hasTemplate?"Using master template — full formatting preserved":"No template imported — basic format (import in Admin)"}
          </div>
        </div>
      </div>
      {toast&&<div style={S.toast}>{toast}</div>}
    </div>
  );

  // ── Data Entry ──
  if(screen==="entry"&&loc){
    const ad=cw.activeDays[dayIdx]||cw.activeDays[0];
    const ec=visibleItems.filter(it=>getInv(it.id,ad?.dayOfWeek)!=="").length;
    return(
      <div style={S.app}>
        <div style={S.header}><button style={S.backBtn} onClick={async()=>{await saveData();setScreen("locations");}}>← Save & Back</button><div style={{flex:1}}><div style={S.headerTitle}>{loc.name}</div><div style={S.headerSub}>Week {cw.num} · {MONTHS[month].slice(0,3)} {cw.startDate}–{cw.endDate}, {year}</div></div><Logo/></div>
        <div style={{display:"flex",background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 4px"}}>
          {DAYS.map((d,di)=>{const isA=cw.activeDays.some(x=>x.dayOfWeek===di);const isSel=ad?.dayOfWeek===di;const ai=cw.activeDays.findIndex(x=>x.dayOfWeek===di);return(
            <div key={d} style={S.dayTab(isSel,isA)} onClick={()=>{if(isA&&ai>=0)setDayIdx(ai);}}><div>{d}</div>{isA&&<div style={{fontSize:11,color:"#94a3b8"}}>{month+1}/{cw.activeDays.find(x=>x.dayOfWeek===di)?.date}</div>}</div>);})}
        </div>
        <div style={{...S.body,paddingBottom:80}}>
          <div style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"2px solid #e2e8f0",marginBottom:4}}>
            <div style={{width:8}}/><div style={{flex:1,fontSize:12,fontWeight:700,color:"#64748b"}}>ITEM</div>
            <div style={{width:58,textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b"}}>PAR</div>
            <div style={{width:58,textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b"}}>INV</div>
            <div style={{width:58,textAlign:"center",fontSize:10,fontWeight:800,color:"#2d5a87"}}>STOCK</div>
          </div>
          {visibleItems.map(item=>{const par=getPar(item.id);const inv=getInv(item.id,ad?.dayOfWeek);const stock=getStock(item.id,ad?.dayOfWeek);const isOv=getOv(item.id,ad?.dayOfWeek);
            const calc=par!==""&&inv!==""?Math.max(0,(parseInt(par)||0)-(parseInt(inv)||0)):"";const disp=stock!==""?stock:calc;
            return(<div key={item.id} style={S.itemRow}>
              <div style={S.catBadge(CC[item.cat]||"#94a3b8")}/>
              <div style={S.itemName}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>{item.vendor&&<div style={{fontSize:11,color:"#94a3b8"}}>{item.vendor}</div>}</div>
              <div style={{width:58}}><div style={S.parLabel}>{par!==""?par:"–"}</div></div>
              <div style={{width:58}}><input type="number" inputMode="numeric" min="0" style={S.input(false)} value={inv} placeholder="–" onFocus={e=>e.target.select()} onChange={e=>setInv(item.id,ad?.dayOfWeek,e.target.value)}/></div>
              <div style={{width:58}}><input type="number" inputMode="numeric" min="0" style={S.input(isOv)} value={disp} placeholder="–" onFocus={e=>e.target.select()} onChange={e=>setStock(item.id,ad?.dayOfWeek,e.target.value)}/></div>
            </div>);})}
        </div>
        <div style={S.saveBar}>
          <button onClick={()=>setShowActions(true)} style={{background:"none",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 12px",cursor:"pointer",fontSize:18,color:"#64748b",lineHeight:1}}>⋯</button>
          <div style={{flex:1,fontSize:12,color:"#94a3b8",textAlign:"center"}}>{ec} / {visibleItems.length} items</div>
          <button style={S.saveBtn} onClick={saveData} disabled={saving}>{saving?"Saving...":"Save"}</button>
        </div>
        {showActions&&<><div style={S.overlay} onClick={()=>setShowActions(false)}/>
          <div style={S.actionMenu}>
            <div style={{fontWeight:700,fontSize:16,color:"#1e293b",marginBottom:14}}>Actions — {DAYS[ad?.dayOfWeek]} {month+1}/{ad?.date}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button style={S.actionBtn} onClick={copyPrev}>📋 Copy previous day's data<div style={{fontSize:12,color:"#94a3b8",fontWeight:400,marginTop:2}}>Copies INV & Stock from the prior day</div></button>
              <button style={S.actionBtn} onClick={fillPars}>📦 Fill stock from par levels<div style={{fontSize:12,color:"#94a3b8",fontWeight:400,marginTop:2}}>Sets INV to 0, Stock to par level</div></button>
              <button style={{...S.actionBtn,color:"#dc2626"}} onClick={clearDay}>🗑 Clear this day's data<div style={{fontSize:12,color:"#94a3b8",fontWeight:400,marginTop:2}}>Removes all entries for {DAYS[ad?.dayOfWeek]}</div></button>
              <button style={{...S.actionBtn,background:"#f8fafc",marginTop:4}} onClick={()=>setShowActions(false)}>Cancel</button>
            </div>
          </div></>}
        {toast&&<div style={S.toast}>{toast}</div>}
      </div>);
  }
  return null;
}

  const root=ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>
  <script>
  if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').then(reg=>console.log('SW:',reg.scope)).catch(err=>console.log('SW err:',err));});}
  </script>
</body>
</html>
